# Ruff configuration
# https://docs.astral.sh/ruff/configuration/

src = ["back"]
target-version = "py312"
line-length = 88

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
]
ignore = [
    "E501",   # line too long (formatter handles this)
]

[lint.isort]
known-first-party = ["meso_negotiator"]

[format]
quote-style = "double"
indent-style = "space"
