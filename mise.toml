#:schema https://mise.jdx.dev/schema/mise.toml.json

[env]
_.path = ["./scripts"]

[tools]
python = "3.12"
uv = "latest"
ruff = "latest"
node = "22"
bun = "latest"

[tasks."setup:python"]
description = "Install Python dependencies"
run = "uv sync"

[tasks."setup:node"]
description = "Install Node dependencies"
dir = "front"
run = "npm install"

[tasks.setup]
description = "Install all dependencies (Python + Node)"
depends = ["setup:python", "setup:node"]

[tasks.lint]
description = "Run all linters"
depends = ["lint:python", "lint:js"]

[tasks."lint:python"]
description = "Lint Python files"
run = "ruff check back/"

[tasks."lint:js"]
description = "Lint JavaScript/TypeScript files"
run = "npx @biomejs/biome check front/"

[tasks."lint:fix"]
description = "Auto-fix all lint issues"
depends = ["lint:fix:python", "lint:fix:js"]

[tasks."lint:fix:python"]
description = "Auto-fix Python lint issues"
run = "ruff check --fix back/"

[tasks."lint:fix:js"]
description = "Auto-fix JS/TS lint issues"
run = "npx @biomejs/biome check --fix front/"

[tasks."lint:staged"]
description = "Lint only staged files"
run = """
#!/usr/bin/env bash
set -e

PY_FILES=$(git diff --cached --name-only --diff-filter=ACM -- '*.py')
JS_FILES=$(git diff --cached --name-only --diff-filter=ACM -- '*.js' '*.ts' '*.jsx' '*.tsx')

if [ -z "$PY_FILES" ] && [ -z "$JS_FILES" ]; then
  echo "No staged files to lint"
  exit 0
fi

if [ -n "$PY_FILES" ]; then
  echo "Linting Python..."
  echo "$PY_FILES" | xargs ruff check
fi

if [ -n "$JS_FILES" ]; then
  echo "Linting JavaScript/TypeScript..."
  echo "$JS_FILES" | xargs npx @biomejs/biome check
fi
"""

[tasks.format]
description = "Auto-format all files"
depends = ["format:python", "format:js"]

[tasks."format:python"]
description = "Format Python files with ruff"
run = "ruff format back/"

[tasks."format:js"]
description = "Format JS/TS files with biome"
run = "npx @biomejs/biome format --write front/"

[tasks."format:check"]
description = "Check formatting without writing"
depends = ["format:check:python", "format:check:js"]

[tasks."format:check:python"]
description = "Check Python formatting"
run = "ruff format --check back/"

[tasks."format:check:js"]
description = "Check JS/TS formatting"
run = "npx @biomejs/biome format front/"

[tasks.test]
description = "Run all tests"
run = "uv run pytest"

[tasks."typecheck:python"]
description = "Run mypy"
run = "uv run mypy back/"

[tasks."typecheck:js"]
description = "Run tsc"
run = "npx tsc --noEmit"

[tasks.typecheck]
description = "Run type checkers"
depends = ["typecheck:python", "typecheck:js"]

[tasks.check]
description = "Run all checks (lint + test)"
depends = ["lint", "test"]

[tasks.dev]
description = "Start backend and frontend dev servers"
run = """
#!/usr/bin/env bash
trap 'kill 0' EXIT
uv run uvicorn back.server:create_app --factory --port 8000 &
cd front && npx vite --port 5173 &
wait
"""

[tasks."dev:stop"]
description = "Stop backend and frontend dev servers"
run = """
#!/usr/bin/env bash
pkill -f 'uvicorn back.server' 2>/dev/null && echo "Backend stopped" || echo "Backend not running"
pkill -f 'vite --port 5173' 2>/dev/null && echo "Frontend stopped" || echo "Frontend not running"
"""

[tasks."validate-commit-msg"]
description = "Validate commit message against Conventional Commits"
run = """
#!/usr/bin/env bash
python ~/.claude/skills/git-workflow/scripts/validate_message.py --file "$1"
"""
